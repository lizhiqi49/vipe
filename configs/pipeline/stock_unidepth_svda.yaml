defaults:
  - /slam: default

instance: vipe.pipeline.default.DefaultAnnotationPipeline

init:
  camera_type: "pinhole"
  intrinsics: "geocalib"
  async_prefetch: true
  prefetch_queue_size: 16
  instance:
    kf_gap_sec: 2.0
    phrases:
      - person
      - animal
      - vehicle
      - ball
      - balloon
      - gun
      - pet
      - car
      - bus
    add_sky: true

slam:
  keyframe_depth: unidepth-l
  optimize_intrinsics: ${neq:${..init.intrinsics},"gt"}

post:
  depth_align_model: "adaptive_unidepth-l_svda"

output:
  path: vipe_results/
  skip_exists: false
  save_artifacts: false
  save_slam_map: false
  save_viz: true
  viz_downsample: 2
  viz_attributes: [['rgb', 'instance'], ['depth', 'pcd']]
